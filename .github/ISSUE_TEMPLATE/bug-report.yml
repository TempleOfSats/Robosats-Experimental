name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-alpha.1 or commit SHA
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Do not include robot tokens, private keys, invoices, onion addresses, or chat contents.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, tokens, keys, invoices, onion addresses, and private trade data.
          required: true
