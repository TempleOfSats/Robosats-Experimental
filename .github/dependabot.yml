version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Etc/UTC
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday
      time: "04:20"
      timezone: Etc/UTC
    groups:
      gradle-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: cargo
    directories:
      - /android/tor-native
      - /android/robo-identities-native
      - /ios/tor-native
      - /desktop/arti-sidecar
    schedule:
      interval: weekly
      day: monday
      time: "04:40"
      timezone: Etc/UTC
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /nodeapp
    schedule:
      interval: weekly
      day: monday
      time: "04:50"
      timezone: Etc/UTC
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    groups:
      github-actions:
        patterns:
          - "*"
