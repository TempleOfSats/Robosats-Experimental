name: Security scanning

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "23 19 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: java-kotlin
            build-mode: manual
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Validate Gradle wrapper
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Install Android SDK
        if: matrix.language == 'java-kotlin'
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0"
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Compile Android sources
        if: matrix.language == 'java-kotlin'
        working-directory: android
        run: ./gradlew --no-daemon :app:compileDebugKotlin
      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

  dependency-audit:
    name: Locked dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - name: Install Rust audit tooling
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Audit Rust lockfiles
        run: |
          cargo audit --file android/tor-native/Cargo.lock --ignore RUSTSEC-2023-0071
          cargo audit --file android/robo-identities-native/Cargo.lock
          cargo audit --file ios/tor-native/Cargo.lock --ignore RUSTSEC-2023-0071
          cargo audit --file desktop/arti-sidecar/Cargo.lock --ignore RUSTSEC-2023-0071
