name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run check:typography
      - run: npm test
      - run: npm run build
      - run: npm run check:production-build
      - run: npm run check:ios:config
      - name: Reject tracked build output
        run: |
          if git ls-files | grep -Eq '(^|/)(build|dist|node_modules|target|\.gradle)/|android/app/src/main/jniLibs/.+\.so$'; then
            echo "Generated build output is tracked by Git." >&2
            git ls-files | grep -E '(^|/)(build|dist|node_modules|target|\.gradle)/|android/app/src/main/jniLibs/.+\.so$' >&2
            exit 1
          fi

  rust:
    name: Rust checks (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android Arti
            manifest: android/tor-native/Cargo.toml
          - name: Android robot identities
            manifest: android/robo-identities-native/Cargo.toml
          - name: iOS Arti
            manifest: ios/tor-native/Cargo.toml
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal
      - name: Check locked dependency graph
        run: cargo +1.94.1 check --locked --manifest-path "${{ matrix.manifest }}"

  android:
    name: Android debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RUSTUP_TOOLCHAIN: 1.94.1
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install Android and Rust build tools
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"
          rustup toolchain install 1.94.1 --profile minimal
          rustup target add --toolchain 1.94.1 aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk --version 4.1.2 --locked
      - run: npm ci
      - name: Build and verify APKs
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          npm run build:android:debug
      - name: Run Android lint
        working-directory: android
        run: ./gradlew --no-daemon lintDebug
