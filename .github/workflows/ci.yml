name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run check:typography
      - run: npm test
      - run: npm run build
      - run: npm run check:production-build
      - run: npm run check:ios:config
      - name: Reject tracked build output
        run: |
          if git ls-files | grep -Eq '(^|/)(build|dist|node_modules|target|\.gradle)/|android/app/src/main/jniLibs/.+\.so$'; then
            echo "Generated build output is tracked by Git." >&2
            git ls-files | grep -E '(^|/)(build|dist|node_modules|target|\.gradle)/|android/app/src/main/jniLibs/.+\.so$' >&2
            exit 1
          fi

  rust:
    name: Rust checks (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android Arti
            manifest: android/tor-native/Cargo.toml
          - name: Android robot identities
            manifest: android/robo-identities-native/Cargo.toml
          - name: iOS Arti
            manifest: ios/tor-native/Cargo.toml
          - name: Desktop Arti
            manifest: desktop/arti-sidecar/Cargo.toml
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal
      - name: Check locked dependency graph
        run: cargo +1.94.1 check --locked --manifest-path "${{ matrix.manifest }}"

  android:
    name: Android debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RUSTUP_TOOLCHAIN: 1.94.1
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install Android and Rust build tools
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"
          rustup toolchain install 1.94.1 --profile minimal
          rustup target add --toolchain 1.94.1 aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk --version 4.1.2 --locked
      - run: npm ci
      - name: Build and verify APKs
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          npm run build:android:debug
      - name: Run Android lint
        working-directory: android
        run: ./gradlew --no-daemon lintDebug

  desktop-and-container:
    name: Desktop and container checks
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      RUSTUP_TOOLCHAIN: 1.94.1
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        run: rustup toolchain install 1.94.1 --profile minimal
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils
      - run: npm ci
      - run: npm run check:desktop
      - run: npm run build:nodeapp
      - name: Smoke-test node app container
        run: |
          docker run --rm -d \
            --name robosats-exp-nodeapp-test \
            --publish 127.0.0.1:12597:12596 \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            robosats-exp-nodeapp:local
          trap 'docker stop robosats-exp-nodeapp-test' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:12597/healthz; then
              break
            fi
            if [[ "$attempt" == 20 ]]; then
              docker logs robosats-exp-nodeapp-test
              exit 1
            fi
            sleep 1
          done
          test "$(docker inspect --format '{{.Config.User}}' robosats-exp-nodeapp-test)" = "nginx"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' robosats-exp-nodeapp-test)" = "true"
          curl --fail --silent --show-error http://127.0.0.1:12597/not-a-real-route |
            grep -q '<div id="root"></div>'
