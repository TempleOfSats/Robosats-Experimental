user http;
worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  types_hash_max_size 4096;
  types_hash_bucket_size 128;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 30;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types application/javascript application/wasm application/json text/css image/svg+xml;

  server {
    listen 127.0.0.1:5173;
    server_name _;
    root /srv/robosats-exp;
    index index.html;

    location = /index.html {
      # Never cache the application entry point. Its asset manifest must be
      # re-read after deployment; the referenced hashed assets remain immutable.
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      try_files /index.html =404;
    }

    location /assets/ {
      try_files $uri =404;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /static/ {
      try_files $uri =404;
      add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
      add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
